# deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devshop-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devshop
  template:
    metadata:
      labels:
        app: devshop
    spec:
      containers:
      - name: devshop
        image: registry.gitlab.com/zinebabrabri/devshop:latest
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: devshop-config